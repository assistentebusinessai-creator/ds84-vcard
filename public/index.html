<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS84OFFICINE – Salva Contatto</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--black:#0a0a0a;--dark:#141414;--card:#1a1a1a;--border:#2a2a2a;--green:#22c55e;--red:#ef4444;--white:#f0f0f0;--muted:#666}
  body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .wrapper{width:100%;max-width:400px}
  .stripe{height:4px;background:linear-gradient(90deg,#16a34a 33%,#fff 33% 66%,#dc2626 66%);border-radius:2px 2px 0 0}
  .card{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;padding:32px 28px 28px}
  .logo-row{display:flex;align-items:center;gap:16px;margin-bottom:28px}
  .logo-circle{width:64px;height:64px;border-radius:50%;border:1px solid var(--border);overflow:hidden;flex-shrink:0}
  .logo-circle img{width:100%;height:100%;object-fit:cover}
  .brand-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1}
  .brand-name span.num{color:var(--red)}
  .brand-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
  .info-list{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
  .info-row{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;background:var(--dark);border:1px solid var(--border);border-radius:8px}
  .info-icon{width:18px;height:18px;flex-shrink:0;margin-top:1px;color:var(--green)}
  .info-text{font-size:13px;color:var(--white);line-height:1.4}
  .info-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
  .divider{height:1px;background:var(--border);margin:24px 0;position:relative}
  .divider::after{content:'QR CODE';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);padding:0 12px;font-size:10px;letter-spacing:2px;color:var(--muted)}
  .qr-section{display:flex;flex-direction:column;align-items:center;gap:16px}
  #qrcode{background:#fff;padding:12px;border-radius:10px;display:inline-block}
  #qrcode canvas,#qrcode img{display:block}
  .qr-hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.6;max-width:260px}
  .btn{width:100%;padding:15px 16px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:none;background:var(--green);color:#000;transition:all 0.15s;margin-top:8px}
  .btn:hover{background:#16a34a;transform:translateY(-1px)}
  .footer{margin-top:20px;text-align:center;font-size:10px;color:#333;letter-spacing:1px;text-transform:uppercase}
  @media print{.btn{display:none}}
</style>
</head>
